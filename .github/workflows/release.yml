name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Build matrix: macOS arm64, macOS x86_64, Linux x86_64
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest        # arm64 (Apple Silicon) runner — native build
            target: aarch64-apple-darwin
            binary_name: resonance-macos-arm64

          - os: macos-latest        # arm64 runner — cross-compile for Intel
            target: x86_64-apple-darwin
            binary_name: resonance-macos-x86_64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: resonance-linux-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Linux-only: install system libraries required by bevy + rodio
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev

      # macOS: no extra dependencies needed

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/resonance ${{ matrix.binary_name }}

      - name: Upload binary artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Create GitHub Release on v* tag pushes
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !cancelled()

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artefacts
        uses: actions/download-artifact@v4
        with:
          path: binaries/

      - name: List downloaded files
        run: find binaries/ -type f

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          name: Resonance ${{ github.ref_name }}
          body: |
            ## Resonance ${{ github.ref_name }}

            A 2D particle physics sonification engine — collisions generate music.

            ### Download & Run

            | Platform | Binary |
            |----------|--------|
            | macOS Apple Silicon | `resonance-macos-arm64` |
            | macOS Intel | `resonance-macos-x86_64` |
            | Linux x86_64 | `resonance-linux-x86_64` |

            **macOS:** After downloading, remove the quarantine attribute and make executable:
            ```bash
            xattr -d com.apple.quarantine resonance-macos-arm64
            chmod +x resonance-macos-arm64
            ./resonance-macos-arm64
            ```

            **Linux:**
            ```bash
            chmod +x resonance-linux-x86_64
            ./resonance-linux-x86_64
            ```

            ### Controls
            - **Space** — spawn 20 particles
            - **Left click** — place gravity well
            - **Left click + drag** — move gravity well
            - **Right click on well** — remove well
            - **C** — clear all particles
            - **R** — reset everything
            - **+/-** — increase/decrease gravity strength
          files: |
            binaries/resonance-macos-arm64/resonance-macos-arm64
            binaries/resonance-macos-x86_64/resonance-macos-x86_64
            binaries/resonance-linux-x86_64/resonance-linux-x86_64
          draft: false
          prerelease: false
